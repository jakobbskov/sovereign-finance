services:
  sovereign-finance:
    build: .
    container_name: sovereign-finance
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      FINANCE_PASSWORD: ${FINANCE_PASSWORD}
      COOKIE_SECURE: ${COOKIE_SECURE}
      SOVEREIGN_FINANCE_ENV: ${SOVEREIGN_FINANCE_ENV}
      AUTH_MODE: ${AUTH_MODE}
      AUTH_VALIDATE_URL: ${AUTH_VALIDATE_URL}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME}
      AUTH_CACHE_TTL_SECONDS: ${AUTH_CACHE_TTL_SECONDS}
    volumes:
      - /opt/sovereign-finance/data:/app/data
      - /opt/sovereign-finance/static:/app/static:ro
    restart: unless-stopped
    ports:
      - "5155:5055"
